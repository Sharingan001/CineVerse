spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: movie-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/movies/**
        - id: booking-service-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/bookings/**,/api/seats/**
          filters:
            - AuthenticationFilter

server:
  port: 8080

