services:
  # 1. API Gateway
  - type: web
    name: api-gateway
    runtime: docker
    dockerContext: day4/api-gateway
    dockerfilePath: day4/api-gateway/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080

  # 2. Auth Service
  - type: web
    name: auth-service
    runtime: docker
    dockerContext: day3/auth-service
    dockerfilePath: day3/auth-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cineverse-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cineverse-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: cineverse-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cineverse-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: cineverse-db
          property: database

  # 3. Movie Service
  - type: web
    name: movie-service
    runtime: docker
    dockerContext: day5/movie-service
    dockerfilePath: day5/movie-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_DATA_MONGODB_URI
        sync: false # You must set this manually in Render dashboard from MongoDB Atlas

  # 4. Booking Service
  - type: web
    name: booking-service
    runtime: docker
    dockerContext: day7/booking-service-redis
    dockerfilePath: day7/booking-service-redis/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8083
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          type: redis
          name: cineverse-redis
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          type: redis
          name: cineverse-redis
          property: port

  # Redis Instance
  - type: redis
    name: cineverse-redis
    plan: free
    ipAllowList: [] # Allows internal connections

databases:
  # PostgreSQL Database
  - name: cineverse-db
    databaseName: cineverse
    user: render
    plan: free
